<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks - WASM Effect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎆</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: block;
            cursor: none;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* Side Panel System */
        .side-panel {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            width: 340px;
            height: 100vh;
            display: flex;
            transform: translateX(-320px);
            transition: all 0.3s ease;
        }

        .side-panel.active {
            transform: translateX(0);
        }

        .panel-content {
            width: 320px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            padding: 20px;
        }

        .panel-tab {
            width: 20px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            backdrop-filter: blur(15px);
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            align-self: center;
        }

        .panel-tab:hover {
            background: rgba(40, 40, 40, 0.9);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .menu-section {
            margin-bottom: 25px;
        }

        .menu-section:last-child {
            margin-bottom: 0;
        }

        .menu-section h3 {
            color: #4CAF50;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(76, 175, 80, 0.3);
            padding-bottom: 8px;
        }

        .menu-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-controls.horizontal {
            flex-direction: row;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 16px;
            background: rgba(76, 175, 80, 0.8);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            min-width: 80px;
        }

        button:hover {
            background: rgba(69, 160, 73, 0.9);
            transform: translateY(-1px);
        }

        button:disabled {
            background: rgba(102, 102, 102, 0.8);
            cursor: not-allowed;
            transform: none;
        }

        .render-mode-btn {
            background: rgba(33, 150, 243, 0.8);
        }

        .render-mode-btn:hover {
            background: rgba(30, 136, 229, 0.9);
        }

        .render-mode-btn.active {
            background: rgba(76, 175, 80, 0.9);
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .info-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #4CAF50;
        }

        .fps-display {
            color: white;
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Mobile responsive adjustments */
        @media (max-width: 768px) {
            .side-panel {
                width: 300px;
                transform: translateX(-280px);
            }

            .panel-content {
                width: 280px;
            }

            .panel-tab {
                width: 18px;
                height: 100px;
            }

            .menu-section h3 {
                font-size: 14px;
            }

            button {
                padding: 12px 16px;
                font-size: 16px;
                min-width: 100px;
            }

            .menu-controls.horizontal {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="512" height="320"></canvas>

    <div class="side-panel" id="sidePanel">
        <div class="panel-content">
            <div class="menu-section">
                <h3>Controls</h3>
                <div class="menu-controls horizontal">
                    <button id="startBtn">Play</button>
                    <button id="pauseBtn" disabled>Pause</button>
                    <button id="resetBtn">Reset</button>
                </div>
            </div>

            <div class="menu-section">
                <h3>Explosion Style</h3>
                <div class="menu-controls" id="renderModeControls">
                    <button id="classicBtn" class="render-mode-btn active">Classic</button>
                    <button id="ringsBtn" class="render-mode-btn">Rings</button>
                    <button id="burstBtn" class="render-mode-btn">Burst</button>
                    <button id="doubleBtn" class="render-mode-btn">Double</button>
                </div>
            </div>

            <div class="menu-section">
                <h3>Performance</h3>
                <div class="fps-display" id="fpsDisplay">
                    <div>C++ FPS: 0</div>
                </div>
            </div>

            <div class="menu-section">
                <h3>Info</h3>
                <div class="info-text" id="infoText">
                    Particle-based fireworks with rockets, explosions, gravity, and trails. Press 1-4 to switch styles.
                </div>
            </div>
        </div>

        <div class="panel-tab" id="panelTab"></div>
    </div>

    <script src="fireworks.js"></script>
    <script>
        let isRunning = false;
        let isPaused = false;
        let imageData = null;
        let menuOpen = false;
        const modeNames = ['Classic', 'Rings', 'Burst', 'Double'];

        window.addEventListener('load', () => {
            Module.onRuntimeInitialized = function() {
                console.log('WASM runtime ready, auto-starting demo');
                setupDemo();
            };

            setTimeout(() => {
                if (!Module || !Module._initDemo) {
                    console.error('WASM module failed to initialize');
                }
            }, 5000);
        });

        function setupDemo() {
            const canvas = document.getElementById('canvas');
            const panelTab = document.getElementById('panelTab');
            const sidePanel = document.getElementById('sidePanel');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const modeButtons = [
                document.getElementById('classicBtn'),
                document.getElementById('ringsBtn'),
                document.getElementById('burstBtn'),
                document.getElementById('doubleBtn')
            ];

            // Panel toggle
            panelTab.addEventListener('click', (e) => {
                e.stopPropagation();
                menuOpen = !menuOpen;
                sidePanel.classList.toggle('active', menuOpen);
            });

            // Close panel when clicking outside
            document.addEventListener('click', (e) => {
                if (menuOpen && !sidePanel.contains(e.target)) {
                    menuOpen = false;
                    sidePanel.classList.remove('active');
                }
            });

            // Control buttons
            startBtn.addEventListener('click', () => {
                if (isPaused) {
                    resumeDemo();
                } else if (!isRunning) {
                    startDemo();
                }
            });

            pauseBtn.addEventListener('click', () => {
                if (isRunning && !isPaused) {
                    pauseDemo();
                }
            });

            resetBtn.addEventListener('click', () => {
                if (Module && Module._resetDemo) {
                    Module._resetDemo();
                }
            });

            // Mode buttons
            modeButtons.forEach((btn, index) => {
                btn.addEventListener('click', () => {
                    if (Module && Module._setRenderMode) {
                        Module._setRenderMode(index);
                        updateModeButtons(index);
                    }
                });
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                const keyNum = parseInt(e.key);
                if (keyNum >= 1 && keyNum <= 4) {
                    const modeIndex = keyNum - 1;
                    if (Module && Module._setRenderMode) {
                        Module._setRenderMode(modeIndex);
                        updateModeButtons(modeIndex);
                    }
                }
            });

            // Initialize imageData
            const ctx = canvas.getContext('2d');
            imageData = ctx.createImageData(canvas.width, canvas.height);

            // Auto-start the demo
            startDemo();
        }

        function updateModeButtons(activeMode) {
            const buttons = ['classicBtn', 'ringsBtn', 'burstBtn', 'doubleBtn'];
            buttons.forEach((btnId, index) => {
                const btn = document.getElementById(btnId);
                if (btn) {
                    btn.classList.toggle('active', index === activeMode);
                }
            });
        }

        let renderingLoopId = null;

        function startRenderingLoop() {
            const canvas = document.getElementById('canvas');

            function renderFrame() {
                if (!isRunning) return;

                if (Module && Module._getPixelBuffer && imageData) {
                    try {
                        const bufferPtr = Module._getPixelBuffer();
                        if (bufferPtr) {
                            const buffer = new Uint8Array(Module.HEAPU8.buffer, bufferPtr, 512 * 320 * 4);
                            imageData.data.set(buffer);

                            const ctx = canvas.getContext('2d');
                            ctx.putImageData(imageData, 0, 0);

                            const fpsDisplay = document.getElementById('fpsDisplay');
                            const cppFps = Module._getCppFps ? Module._getCppFps() : 0;
                            fpsDisplay.innerHTML = `<div>C++ FPS: ${Math.round(cppFps)}</div>`;
                        }
                    } catch (error) {
                        console.warn('Render error:', error);
                    }
                }

                renderingLoopId = requestAnimationFrame(renderFrame);
            }

            renderingLoopId = requestAnimationFrame(renderFrame);
        }

        function stopRenderingLoop() {
            if (renderingLoopId) {
                cancelAnimationFrame(renderingLoopId);
                renderingLoopId = null;
            }
        }

        function startDemo() {
            if (Module && Module._initDemo) {
                try {
                    Module._initDemo();
                    isRunning = true;
                    isPaused = false;
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('pauseBtn').disabled = false;
                } catch (error) {
                    if (error === 'unwind') {
                        isRunning = true;
                        isPaused = false;
                        document.getElementById('startBtn').disabled = true;
                        document.getElementById('pauseBtn').disabled = false;
                        startRenderingLoop();
                    } else {
                        console.error('Start error:', error);
                    }
                }
            }
        }

        function pauseDemo() {
            if (Module && Module._pauseDemo) {
                try {
                    Module._pauseDemo();
                    isPaused = true;
                    document.getElementById('pauseBtn').disabled = true;
                    document.getElementById('startBtn').disabled = false;
                } catch (error) {
                    console.error('Pause error:', error);
                }
            }
        }

        function resumeDemo() {
            if (Module && Module._resumeDemo) {
                try {
                    Module._resumeDemo();
                    isPaused = false;
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('pauseBtn').disabled = false;
                } catch (error) {
                    console.error('Resume error:', error);
                }
            }
        }
    </script>
</body>
</html>
